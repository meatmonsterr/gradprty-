<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Invitation</title>

<style>
@import url(https://db.onlinewebfonts.com/c/0930b33e3b23483beec8d94d6eb3073d?family=F1589_Humane_Bordeaux+W00+Normal);
</style>

<style>

body {
  margin: 0;
  background: black;
  overflow: hidden;
  overflow-y: auto;
}

/* PANTALLAS */
.screen {
  position: relative;
  width: 100%;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  padding: 80px 20px 120px;
}

/* ENVELOPE */
.envelope {
  width: 650px;
  cursor: pointer;
}

.small-text {
  color: white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  margin-top: 20px;
  font-size: 18px;
  opacity: 0.8;
}

/* CARD */
.card-img {
  width: 850px;
}

/* PRINTER */
.printer-img {
  width: 420px;
  cursor: pointer;
  margin-top: 25px;
}

/* TICKET (MÁS GRANDE) */
.ticket {
  width: 770px;
  margin-top: 60px;
  display: none;
}

/* ADDRESS */
.button {
  padding: 12px 32px;
  border-radius: 30px;
  background: white;
  color: black;
  text-decoration: none;
  font-size: 18px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  margin-top: 80px;
}

/* COUNTDOWN (más separación + más aire) */
.countdown {
  margin-top: 70px;
  color: white;
  font-size: 60px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
}

/* FINAL TEXT */
.footer-text {
  margin-top: 60px;
  color: white;
  font-size: 100px;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
}

/* 🎵 MUSIC CENTRADO */
.music-controls {
  position: fixed;
  bottom: 25px;
  left: 50%;
  transform: translateX(-50%); /* 👈 CENTRADO PERFECTO */
  display: none;
  gap: 15px;
}

.music-btn {
  padding: 18px 34px;
  border-radius: 30px;
  font-size: 20px;
  background: transparent;
  color: white;
  border: 2px solid white;
  font-family: "F1589_Humane_Bordeaux W00 Normal";
  cursor: pointer;
}

/* STARS */
.star {
  position: fixed;
  width: 25px;
  height: 25px;
  background: #C8B273;
  clip-path: polygon(
    50% 0%, 61% 35%, 98% 35%, 68% 57%,
    79% 91%, 50% 70%, 21% 91%, 32% 57%,
    2% 35%, 39% 35%
  );
  animation: fall 2.5s linear forwards;
  opacity: 0.9;
}

@keyframes fall {
  to {
    transform: translateY(110vh) scale(0);
    opacity: 0;
  }
}

</style>
</head>

<body>

<audio id="music" src="ribslorse.m4a" loop></audio>

<!-- HOME -->
<div id="home" class="screen">
  <img src="Untitled1419_20260507174102.png" class="envelope" onclick="openInvite()">
  <div class="small-text">tap to open</div>
</div>

<!-- INVITATION -->
<div id="invitation" class="screen hidden">

  <img src="Untitled1420_20260507175041.png" class="card-img">

  <img src="Untitled1427_20260507180932.png" class="printer-img" onclick="printTicket()">

  <!-- TICKET -->
  <img src="Untitled1426_20260507181354.png" class="ticket" id="ticket">

  <!-- ADDRESS -->
  <a class="button hidden" id="address"
     href="https://maps.app.goo.gl/vbqbLUkQrp8ppB4K6?g_st=ic" target="_blank">
    Address
  </a>

  <!-- COUNTDOWN -->
  <div class="countdown hidden" id="countdown"></div>

  <!-- TEXT -->
<div class="footer-text hidden" id="footerText">THANKS!!</div>

</div>

<!-- MUSIC -->
<div class="music-controls" id="musicControls">
  <button id="playPauseBtn" class="music-btn" onclick="toggleMusic()">Play</button>
  <button class="music-btn" onclick="restartMusic()">Restart</button>
</div>

<script>

const music = document.getElementById("music");
const btn = document.getElementById("playPauseBtn");
let started = false;

/* OPEN */
function openInvite() {
  document.getElementById("home").classList.add("hidden");
  document.getElementById("invitation").classList.remove("hidden");

  document.getElementById("musicControls").style.display = "flex";

  if (!started) {
    music.currentTime = 47;
    started = true;
  }

  music.play().catch(()=>{});
  btn.textContent = "Pause";

  startStars();
}

/* 🖨️ PRINT (TICKET + INFO TOGETHER) */
function printTicket() {
  document.getElementById("ticket").style.display = "block";
  document.getElementById("address").classList.remove("hidden");
  document.getElementById("countdown").classList.remove("hidden");
  document.getElementById("footerText").classList.remove("hidden");

  startCountdown();
}

/* ⭐ STARS */
function createStar() {
  const star = document.createElement("div");
  star.className = "star";
  star.style.left = Math.random() * window.innerWidth + "px";
  star.style.top = "0px";
  document.body.appendChild(star);
  setTimeout(() => star.remove(), 2500);
}

function startStars() {
  setInterval(createStar, 160);
}

/* ⏳ COUNTDOWN */
function startCountdown() {
  const target = new Date("May 30, 2026 00:00:00").getTime();

  setInterval(() => {
    const now = new Date().getTime();
    const diff = target - now;

    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);

    document.getElementById("countdown").innerHTML =
      `${d}d ${h}h ${m}m ${s}s`;

  }, 1000);
}

/* MUSIC */
function toggleMusic() {
  if (music.paused) {
    music.play();
    btn.textContent = "Pause";
  } else {
    music.pause();
    btn.textContent = "Play";
  }
}

function restartMusic() {
  music.currentTime = 47;
  music.play();
  btn.textContent = "Pause";
}

</script>

</body>
</html>
